name: Plugin tests

on:
    push:
        branches: [main]
    pull_request:

jobs:
    lint:
        name: Run npm lint

        runs-on: ubuntu-latest

        env:
            NODE_VERSION: '24'

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install npm dependencies
              run: npm ci

            - name: Install Composer dependencies
              run: composer install --no-interaction --no-progress

            - name: Run npm lint
              run: npm run lint

            - name: Build blocks
              run: npm run build

            - name: Check generated files are committed
              run: git diff --exit-code

    test:
        name: Run npm test

        runs-on: ubuntu-latest

        needs: [lint]

        env:
            NODE_VERSION: '24'

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install npm dependencies
              run: npm ci

            - name: Install Composer dependencies
              run: composer install --no-interaction --no-progress

            - name: Run npm test
              timeout-minutes: 15
              run: npm run test

            - name: Upload Playwright test results
              if: always()
              uses: actions/upload-artifact@v5
              with:
                  name: playwright-report
                  path: |
                      test-results/
                      playwright-report/
                  if-no-files-found: ignore
