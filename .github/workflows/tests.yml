name: Plugin tests

on:
    push:
        branches: [main]
    pull_request:

jobs:
    npm-checks:
        name: NPM lint / format / build checks

        runs-on: ubuntu-latest

        env:
            NODE_VERSION: '24'

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install npm dependencies
              run: npm ci

            - name: Lint package.json
              run: npm run lint:pkg-json

            - name: Lint JavaScript
              run: npm run lint:js

            - name: Lint styles
              run: npm run lint:css

            - name: Lint Markdown docs
              run: npm run lint:md:docs

            - name: Check formatting
              run: npm run format -- --check

            - name: Build blocks
              run: npm run build

            - name: Check generated files are committed
              run: git diff --exit-code

    setup-playwright:
        name: Download Playwright browsers

        runs-on: ubuntu-latest

        env:
            NODE_VERSION: '24'

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install npm dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install chromium

            - name: Upload Playwright browsers
              uses: actions/upload-artifact@v5
              with:
                  name: playwright-browsers
                  path: ~/.cache/ms-playwright
                  retention-days: 1

    test:
        # ここにバージョンが出るので「どの組み合わせを見ているか」を常に確認しやすい
        name: PHP ${{ matrix.php }} / WP ${{ matrix.wp }}

        runs-on: ubuntu-latest

        needs: [npm-checks, setup-playwright]

        strategy:
            fail-fast: false
            matrix:
                php: ['8.1', '8.5'] # PHPメンテの最低、現行最新バージョンをカバー
                wp: ['6.9', '7.0'] # サポート対象の最新2バージョンをカバー

        env:
            # 後で使う用
            NODE_VERSION: '24'

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install npm dependencies
              run: npm ci
              env:
                  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

            - name: Building Blocks
              run: npm run build

            - name: Install Composer dependencies
              run: composer install --no-interaction --no-progress

            - name: Generate .wp-env.json for matrix
              run: |
                  sed -e "s/__PHP_VERSION__/${{ matrix.php }}/" \
                      -e "s/__WP_VERSION__/${{ matrix.wp }}/" \
                      .github/.wp-env.template.json > .wp-env.json

                  echo "===== .wp-env.json ====="
                  cat .wp-env.json

            - name: Download Playwright browsers
              uses: actions/download-artifact@v4
              with:
                  name: playwright-browsers
                  path: ~/.cache/ms-playwright

            - name: Install Playwright system dependencies
              run: npx playwright install-deps chromium

            - name: Start wp-env
              run: npm run wp-env:start

            - name: Run PHPUnit (wp-env:test)
              timeout-minutes: 5
              run: npm run wp-env:test

            - name: Run e2e tests (Playwright)
              timeout-minutes: 5
              run: npm run test:e2e

            - name: Upload Playwright test results
              if: always()
              uses: actions/upload-artifact@v5
              with:
                  name: playwright-report-php${{ matrix.php }}-wp${{ matrix.wp }}
                  path: |
                      test-results/
                      playwright-report/
                  if-no-files-found: ignore

            - name: Stop wp-env
              if: always()
              run: npm run wp-env:stop
