name: Plugin tests

on:
    push:
        branches: [main]
    pull_request:

env:
    NODE_VERSION: '24'

jobs:
    lint:
        name: Run npm lint

        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Cache npm dependencies
              id: npm-cache
              uses: actions/cache@v4
              with:
                  path: node_modules/
                  key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-npm-${{ hashFiles('package-lock.json') }}

            - name: Install npm dependencies
              if: steps.npm-cache.outputs.cache-hit != 'true'
              run: npm ci

            - name: Cache Composer dependencies
              id: composer-cache
              uses: actions/cache@v4
              with:
                  path: vendor/
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

            - name: Install Composer dependencies
              if: steps.composer-cache.outputs.cache-hit != 'true'
              run: composer install --no-interaction --no-progress

            - name: Run npm lint
              run: npm run lint

            - name: Build blocks
              run: npm run build

            - name: Check generated files are committed
              run: git diff --exit-code

    playwright:
        name: Install Playwright browsers

        runs-on: ubuntu-latest
        timeout-minutes: 1

        needs: [lint]

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Restore npm dependencies
              id: npm-cache
              uses: actions/cache/restore@v4
              with:
                  path: node_modules/
                  key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-npm-${{ hashFiles('package-lock.json') }}

            - name: Install npm dependencies
              if: steps.npm-cache.outputs.cache-hit != 'true'
              run: npm ci

            - name: Cache Playwright browsers
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

            - name: Install Playwright browsers
              run: npx --no-install playwright install chromium

    test:
        name: PHP ${{ matrix.php }} / WP ${{ matrix.wp }}

        runs-on: ubuntu-latest
        timeout-minutes: 5

        needs: [playwright]

        strategy:
            fail-fast: false
            matrix:
                php: ['8.1', '8.5']
                wp: ['6.9', '7.0']

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Restore npm dependencies
              id: npm-cache
              uses: actions/cache/restore@v4
              with:
                  path: node_modules/
                  key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-npm-${{ hashFiles('package-lock.json') }}

            - name: Install npm dependencies
              if: steps.npm-cache.outputs.cache-hit != 'true'
              run: npm ci

            - name: Restore Composer dependencies
              id: composer-cache
              uses: actions/cache/restore@v4
              with:
                  path: vendor/
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

            - name: Install Composer dependencies
              if: steps.composer-cache.outputs.cache-hit != 'true'
              run: composer install --no-interaction --no-progress

            - name: Generate .wp-env.json for matrix
              run: |
                  sed -e "s/__PHP_VERSION__/${{ matrix.php }}/" \
                      -e "s/__WP_VERSION__/${{ matrix.wp }}/" \
                      .github/.wp-env.template.json > .wp-env.json

                  echo "===== .wp-env.json ====="
                  cat .wp-env.json

            - name: Restore Playwright browsers
              uses: actions/cache/restore@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

            - name: Run npm test
              run: npm run test

            - name: Upload Playwright test results
              if: always()
              uses: actions/upload-artifact@v5
              with:
                  name: playwright-report
                  path: |
                      test-results/
                      playwright-report/
                  if-no-files-found: ignore
