name: Plugin tests

on:
    push:
        branches: [main]
    pull_request:

jobs:
    lint:
        name: Run npm lint

        runs-on: ubuntu-latest

        env:
            NODE_VERSION: '24'

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install npm dependencies
              run: npm ci

            - name: Install Composer dependencies
              run: composer install --no-interaction --no-progress

            - name: Run npm lint
              run: npm run lint

            - name: Check generated files are committed
              run: git diff --exit-code

    build:
        name: Run npm build

        runs-on: ubuntu-latest

        env:
            NODE_VERSION: '24'

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install npm dependencies
              run: npm ci

            - name: Build blocks
              run: npm run build

    test:
        name: PHP ${{ matrix.php }} / WP ${{ matrix.wp }}

        runs-on: ubuntu-latest

        needs: [lint, build]

        strategy:
            fail-fast: false
            matrix:
                php: ['8.1', '8.5']
                wp: ['6.9', '7.0']

        env:
            NODE_VERSION: '24'

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'

            - name: Install npm dependencies
              run: npm ci

            - name: Install Composer dependencies
              run: composer install --no-interaction --no-progress

            - name: Generate .wp-env.json for matrix
              run: |
                  sed -e "s/__PHP_VERSION__/${{ matrix.php }}/" \
                      -e "s/__WP_VERSION__/${{ matrix.wp }}/" \
                      .github/.wp-env.template.json > .wp-env.json

                  echo "===== .wp-env.json ====="
                  cat .wp-env.json

            - name: Pre-download Playwright browsers
              timeout-minutes: 5
              run: npx --no-install playwright install chromium

            - name: Run npm test
              timeout-minutes: 15
              run: npm run test

            - name: Upload Playwright test results
              if: always()
              uses: actions/upload-artifact@v5
              with:
                  name: playwright-report
                  path: |
                      test-results/
                      playwright-report/
                  if-no-files-found: ignore
